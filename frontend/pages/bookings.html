<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKWIEER - My Bookings</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body onload="checkAuth(); loadUserBookings()">
    <div id="notification" class="notification"></div>

    <nav class="glass-card" style="margin: 1rem; padding: 1rem 2rem; border-radius: 1rem; display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="../assets/kkw_logo.png" alt="KKW Logo" style="height: 30px; width: auto;">
            <h2 style="color: white; font-family: Poppins, sans-serif; font-size: 1.4rem; margin: 0;">KKWIEER</h2>
        </div>
        <div style="display: flex; gap: 2rem; align-items: center;">
            <a href="dashboard.html" style="color: rgba(255,255,255,0.8); text-decoration: none;">Dashboard</a>
            <a href="halls.html" style="color: rgba(255,255,255,0.8); text-decoration: none;">Reserve Hall</a>
            <a href="bookings.html" style="color: white; text-decoration: none; font-weight: 600;">My Bookings</a>
            <a href="events.html" style="color: rgba(255,255,255,0.8); text-decoration: none;">Events</a>
            <a href="#" onclick="localStorage.clear(); window.location.href='../index.html'" style="color: rgba(255,200,200,0.9); text-decoration: none;"><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </nav>

    <main style="padding: 2rem;">
        <div style="margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <div>
                <h1>My Bookings</h1>
                <p style="color: var(--text-muted)">Track your reservation requests and access entry codes.</p>
            </div>
            <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
                <button class="btn btn-outline" onclick="filterBookings('All')">All</button>
                <button class="btn btn-outline" onclick="filterBookings('Pending')">Pending</button>
                <button class="btn btn-outline" onclick="filterBookings('Approved')">Approved</button>
                <button class="btn btn-outline" onclick="printPermissionSummary()" title="Print Permission Letter"><i class="fas fa-print"></i> Print</button>
            </div>
        </div>

        <div id="bookings-list" style="display: flex; flex-direction: column; gap: 1.5rem;">
            <!-- Loading state -->
            <p>Loading your bookings...</p>
        </div>

        <!-- PDF / Poster Download Modal -->
        <div id="perm-overlay" style="display:none; position:fixed; inset:0; z-index:1000; background:rgba(10,20,60,0.55); backdrop-filter:blur(4px); align-items:center; justify-content:center;" onclick="if(event.target===this) toggleQRModal()">
            <div class="glass-card" style="width:92%; max-width:420px; text-align:center; position:relative;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem;">
                    <h3>Download Documents</h3>
                    <i class="fas fa-times" style="cursor:pointer; color:var(--text-muted);" onclick="toggleQRModal()"></i>
                </div>
                <p style="font-size:0.875rem; color:var(--text-muted); margin-bottom:1.5rem;">Download the official permission letter or event poster for your approved booking.</p>
                <button class="btn btn-primary" style="width:100%; margin-bottom:0.75rem;" onclick="generatePDFPermission()"><i class="fas fa-file-pdf"></i> Download Permission Letter (PDF)</button>
                <button class="btn btn-outline" style="width:100%;" onclick="generateBasicPoster()"><i class="fas fa-image"></i> Download Poster</button>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="../js/api.js"></script>
    <script>
        let currentBooking = null;

        async function loadUserBookings() {
            try {
                const bookings = await api.bookings.getUserBookings();
                // Store all (for filterBookings), but only show non-cancelled by default
                window.userBookings = bookings;
                allUserBookings = bookings.filter(b => b.status !== 'Cancelled');
                renderBookings(allUserBookings);
            } catch (err) {
                showNotification(err.message, 'error');
            }
        }

        function renderBookings(bookings) {
            const container = document.getElementById('bookings-list');
            if (bookings.length === 0) {
                container.innerHTML = '<div class="glass-card" style="text-align: center; padding: 3rem;"><h3>No bookings found</h3><p style="color: var(--text-muted)">Go ahead and book your first hall!</p></div>';
                return;
            }

            container.innerHTML = bookings.map(b => `
                <div class="glass-card animate-fade" style="display:flex; justify-content:space-between; align-items:center; border-left:4px solid ${getStatusColor(b.status)}">
                    <div>
                        <h3 style="margin-bottom:0.25rem;">${b.eventName || 'Event'} @ ${b.hall.name}</h3>
                        <p style="font-size:0.9rem; margin-bottom:0.5rem;"><i class="fas fa-calendar-alt"></i> ${new Date(b.date).toLocaleDateString()} | <i class="fas fa-clock"></i> ${b.startTime} - ${b.endTime}</p>
                        <p style="font-size:0.85rem; color:var(--text-muted)"><strong>Purpose:</strong> ${b.purpose}</p>
                    </div>
                    <div style="text-align:right; flex-shrink:0;">
                        <span style="display:inline-block; padding:0.25rem 0.75rem; border-radius:50px; font-size:0.8rem; font-weight:bold; background:${getStatusColor(b.status)}20; color:${getStatusColor(b.status)}">${b.status}</span>
                        ${(b.status === 'Pending' || b.status === 'Approved') ? `<button class="btn btn-outline btn-sm" style="display:block; margin-top:0.5rem; color:#ff4444; border-color:#ff4444;" onclick="cancelBooking('${b._id}')">Cancel</button>` : ''}
                        ${b.status === 'Approved' ? `<button class="btn btn-primary btn-sm" style="display:block; margin-top:0.5rem;" onclick="openPermDocs('${b._id}')"><i class="fas fa-download"></i> Documents</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function getStatusColor(status) {
            if (status === 'Approved') return 'var(--success)';
            if (status === 'Pending') return 'var(--warning)';
            if (status === 'Completed') return '#3b82f6';
            if (status === 'Released') return '#64748b';
            return 'var(--error)';
        }

        function toggleQRModal() {
            const ov = document.getElementById('perm-overlay');
            ov.style.display = (ov.style.display === 'flex') ? 'none' : 'flex';
        }

        function openPermDocs(id) {
            currentBooking = id;
            document.getElementById('perm-overlay').style.display = 'flex';
        }

        async function generateBasicPoster() {
            if (!currentBooking) return;
            try {
                showNotification('Generating poster...', 'info');
                const data = await api.bookings.getPoster(currentBooking);
                const link = document.createElement('a');
                link.href = data.poster;
                link.download = `event_poster_${currentBooking}.png`;
                link.click();
                showNotification('Poster downloaded!', 'success');
            } catch (err) {
                showNotification('Failed to generate poster', 'error');
            }
        }

        async function generatePDFPermission() {
            if (!currentBooking) return;
            try {
                showNotification('Generating PDF...', 'info');
                const b = window.userBookings.find(x => x._id === currentBooking);
                if (!b) return;

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
                const pageWidth = doc.internal.pageSize.getWidth();
                
                // --- Document Border ---
                doc.setDrawColor(29, 78, 216); // var(--primary)
                doc.setLineWidth(1.5);
                doc.rect(10, 10, pageWidth - 20, 277);
                
                // --- Header Section ---
                doc.setFillColor(241, 245, 249); // slate-100
                doc.rect(12, 12, pageWidth - 24, 40, 'F');
                
                doc.setFontSize(24);
                doc.setTextColor(15, 23, 42); // slate-900
                doc.setFont('helvetica', 'bold');
                doc.text("KKWIEER Event Permission", pageWidth/2, 28, { align: 'center' });
                
                doc.setFontSize(10);
                doc.setTextColor(100, 116, 139); // slate-500
                doc.setFont('helvetica', 'normal');
                doc.text(`Document Reference ID: ${b._id}`, pageWidth/2, 36, { align: 'center' });
                doc.text(`Generated on: ${new Date().toLocaleString()}`, pageWidth/2, 42, { align: 'center' });
                
                // --- Event Details Section ---
                let yPos = 65;
                doc.setFontSize(14);
                doc.setTextColor(15, 23, 42);
                doc.setFont('helvetica', 'bold');
                doc.text("EVENT INFORMATION", 20, yPos);
                
                doc.setDrawColor(203, 213, 225); // slate-300
                doc.setLineWidth(0.5);
                doc.line(20, yPos + 2, pageWidth - 20, yPos + 2);
                
                yPos += 12;
                doc.setFontSize(11);
                doc.setTextColor(71, 85, 105); // slate-600
                doc.setFont('helvetica', 'bold');
                
                // Use a 2-column layout for some details
                const col1 = 20;
                const col2 = 65;
                const lineH = 9;
                
                doc.text("Event Name:", col1, yPos);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(15, 23, 42);
                doc.text(b.eventName || 'N/A', col2, yPos);
                
                yPos += lineH;
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(71, 85, 105);
                doc.text("Organizer Name:", col1, yPos);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(15, 23, 42);
                doc.text(`${b.name || b.user?.name || 'N/A'} (Year: ${b.year || '-'}, Dept: ${b.department || '-'})`, col2, yPos);
                
                yPos += lineH;
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(71, 85, 105);
                doc.text("Club/Association:", col1, yPos);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(15, 23, 42);
                doc.text(`${b.club || 'None'} ${b.post ? '('+b.post+')' : ''}`, col2, yPos);
                
                yPos += lineH;
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(71, 85, 105);
                doc.text("Venue/Hall:", col1, yPos);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(15, 23, 42);
                doc.text(b.hall ? b.hall.name : 'Unknown', col2, yPos);
                
                yPos += lineH;
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(71, 85, 105);
                doc.text("Date:", col1, yPos);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(15, 23, 42);
                doc.text(new Date(b.date).toLocaleDateString(), col2, yPos);
                
                yPos += lineH;
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(71, 85, 105);
                doc.text("Time (Duration):", col1, yPos);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(15, 23, 42);
                doc.text(`${b.startTime} to ${b.endTime}`, col2, yPos);
                
                yPos += lineH;
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(71, 85, 105);
                doc.text("Purpose:", col1, yPos);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(15, 23, 42);
                // Handle text wrapping for purpose
                const splitPurpose = doc.splitTextToSize(b.purpose || 'N/A', pageWidth - col2 - 20);
                doc.text(splitPurpose, col2, yPos);
                
                // --- Status Stamp ---
                yPos += (splitPurpose.length * lineH) + 20;
                
                // A nice green box for the status
                doc.setFillColor(240, 253, 244); // green-50
                doc.setDrawColor(34, 197, 94); // green-500
                doc.setLineWidth(1);
                doc.roundedRect(20, yPos, pageWidth - 40, 25, 3, 3, 'FD');
                
                doc.setFontSize(16);
                doc.setTextColor(21, 128, 61); // green-700
                doc.setFont('helvetica', 'bold');
                doc.text("STATUS: OFFICIALLY APPROVED", pageWidth/2, yPos + 16, { align: 'center' });
                
                // --- Signatures ---
                yPos += 55;
                
                doc.setDrawColor(148, 163, 184); // slate-400
                doc.setLineWidth(0.5);
                
                // Left Signature
                doc.line(30, yPos, 85, yPos);
                doc.setFontSize(11);
                doc.setTextColor(71, 85, 105);
                doc.setFont('helvetica', 'bold');
                doc.text("Faculty Coordinator", 57.5, yPos + 6, { align: 'center' });
                
                // Right Signature
                doc.line(pageWidth - 85, yPos, pageWidth - 30, yPos);
                doc.text("Head of Department", pageWidth - 57.5, yPos + 6, { align: 'center' });
                
                // --- Footer Info ---
                doc.setFontSize(9);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(148, 163, 184);
                doc.text("Please keep a digital or printed copy of this document on the day of the event.", pageWidth/2, 275, { align: 'center' });

                doc.save(`Permission_${b.eventName || b._id}.pdf`);
                showNotification('PDF downloaded successfully!', 'success');
            } catch (err) {
                console.error(err);
                showNotification('Failed to generate PDF', 'error');
            }
        }

        async function cancelBooking(id) {
            if (!confirm('Are you sure you want to cancel this booking?')) return;
            try {
                await api.bookings.cancel(id);
                showNotification('Booking cancelled successfully!', 'success');
                // Refresh list — cancelled entry will be filtered out automatically
                loadUserBookings();
            } catch (err) {
                showNotification(err.message, 'error');
            }
        }

        let allUserBookings = [];
        function filterBookings(status) {
            const list = status === 'All' ? allUserBookings : allUserBookings.filter(b => b.status === status);
            renderBookings(list);
        }

        function printPermissionSummary() {
            const approved = (window.userBookings || []).filter(b => b.status === 'Approved');
            if (approved.length === 0) {
                showNotification('No approved bookings to print!', 'error');
                return;
            }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            const pageW = 210;
            const margin = 20;

            // Header
            doc.setFillColor(29, 78, 216);
            doc.rect(0, 0, pageW, 30, 'F');
            doc.setFontSize(16);
            doc.setTextColor(255, 255, 255);
            doc.setFont('helvetica', 'bold');
            doc.text('KKWIEER - Hall Booking Permission Summary', pageW / 2, 13, { align: 'center' });
            doc.setFontSize(9);
            doc.setFont('helvetica', 'normal');
            doc.text(`Printed on: ${new Date().toLocaleDateString('en-IN', { year:'numeric', month:'long', day:'numeric' })}`, pageW / 2, 22, { align: 'center' });

            let y = 42;

            approved.forEach((b, idx) => {
                if (y > 240) { doc.addPage(); y = 25; }

                // Card box
                doc.setDrawColor(29, 78, 216);
                doc.setLineWidth(0.5);
                doc.roundedRect(margin, y - 4, pageW - margin * 2, 52, 2, 2, 'S');

                // Approved stamp
                doc.setFontSize(7);
                doc.setTextColor(22, 163, 74);
                doc.setFont('helvetica', 'bold');
                doc.text('✓ APPROVED', pageW - margin - 2, y + 2, { align: 'right' });

                doc.setTextColor(15, 30, 80);
                doc.setFontSize(12);
                doc.setFont('helvetica', 'bold');
                doc.text(`${idx + 1}. ${b.eventName || 'Event'}`, margin + 4, y + 4);

                doc.setFontSize(9);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(60, 60, 90);
                const lines = [
                    `Hall:    ${b.hall?.name || 'N/A'}`,
                    `Date:    ${new Date(b.date).toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}`,
                    `Time:    ${b.startTime} – ${b.endTime}`,
                    `Organizer: ${b.name || 'N/A'} (Year: ${b.year || 'N/A'}, Dept: ${b.department || 'N/A'})`,
                    `Club:    ${b.club || 'None'}${b.post ? ' — ' + b.post : ''}`,
                    `Purpose: ${b.purpose}`
                ];
                lines.forEach((line, li) => {
                    doc.text(line, margin + 4, y + 12 + li * 6.5);
                });

                y += 62;
            });

            // Footer with signature lines
            if (y > 230) { doc.addPage(); y = 25; }
            y += 10;
            doc.setDrawColor(140, 140, 180);
            doc.setLineWidth(0.3);
            doc.line(margin, y, margin + 60, y);
            doc.line(pageW - margin - 60, y, pageW - margin, y);
            doc.setFontSize(8);
            doc.setTextColor(80, 80, 100);
            doc.setFont('helvetica', 'normal');
            doc.text('Faculty Coordinator', margin, y + 5);
            doc.text('Head of Department', pageW - margin - 60, y + 5);

            doc.save(`KKWIEER_Booking_Permission_${new Date().toISOString().slice(0, 10)}.pdf`);
            showNotification('Permission letter downloaded!', 'success');
        }
    </script>
</body>
</html>
